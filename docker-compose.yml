services:
  openttd-server:
    image: bateau/openttd:latest
    container_name: openttd-server
    restart: unless-stopped
    volumes:
      - ${OPENTTD_DATA_DIR}:/home/openttd/.openttd
      - ${OPENTTD_DATA_DIR}:/home/openttd/.local/share/openttd
      - ${OPENTTD_DATA_DIR}:/usr/share/games/openttd/openttd
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - loadgame=${LOADGAME:-false}
      - savename=${SAVENAME:-}
      - savepath=/home/openttd/.openttd
    networks:
      openttd_network:
        ipv4_address: ${OPENTTD_SERVER_IP:-172.19.0.5}
    stdin_open: true
    tty: true

  tcp-guard:
    build:
      context: ./tcp-guard
    image: tcp-guard:latest
    container_name: tcp-guard
    restart: unless-stopped
    depends_on:
      - openttd-server
    environment:
      - TCP_GUARD_PROXY_TIMEOUT=${TCP_GUARD_PROXY_TIMEOUT:-30m}
      - TCP_GUARD_CONNECT_TIMEOUT=${TCP_GUARD_CONNECT_TIMEOUT:-5s}
      - TCP_GUARD_PREREAD_TIMEOUT=${TCP_GUARD_PREREAD_TIMEOUT:-5s}
      - TCP_GUARD_MAX_CONN=${TCP_GUARD_MAX_CONN:-16}
    networks:
      openttd_network:
        ipv4_address: ${TCP_GUARD_IP:-172.19.0.10}

  utils-bot:
    build:
      context: ./utils-bot
    image: openttd-utils-bot:latest
    container_name: openttd-utils-bot
    restart: unless-stopped
    depends_on:
      - openttd-server
    environment:
      - OPENTTD_HOST=openttd-server
      - OPENTTD_ADMIN_PORT=${OPENTTD_ADMIN_PORT:-3977}
      - OPENTTD_ADMIN_PASSWORD=${OPENTTD_ADMIN_PASSWORD}
      - BOT_NAME=${BOT_NAME:-utils-bot}
      - SAVENAME=${SAVENAME:-autosave_bot}
      - SAVE_INTERVAL_MINS=${SAVE_INTERVAL_MINS:-10}
    networks:
      openttd_network:

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit-tunnel
    restart: unless-stopped
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}
    networks:
      - openttd_network

networks:
  openttd_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.19.0.0/24}
