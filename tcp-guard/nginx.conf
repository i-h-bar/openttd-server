include /etc/nginx/modules/*.conf;

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    log_format basic '$remote_addr [$time_local] $protocol $status '
                     '$bytes_sent $bytes_received $session_time';
    access_log /dev/stdout basic;

    limit_conn_zone $binary_remote_addr zone=per_ip:1m;

    upstream openttd {
        server openttd-server:3979;
    }

    server {
        listen 3979;
        proxy_pass openttd;

        proxy_timeout ${TCP_GUARD_PROXY_TIMEOUT};
        proxy_connect_timeout ${TCP_GUARD_CONNECT_TIMEOUT};
        preread_timeout ${TCP_GUARD_PREREAD_TIMEOUT};
        tcp_nodelay on;

        limit_conn per_ip ${TCP_GUARD_MAX_CONN};
    }

    server {
        listen 3979 udp;
        proxy_pass openttd;

        proxy_timeout ${TCP_GUARD_PROXY_TIMEOUT};
    }
}
